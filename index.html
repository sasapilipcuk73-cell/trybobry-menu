<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Три Бобри | Меню</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f5f3ee;
color:#222;
}

.hero{
height:300px;
background:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200') center/cover;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
color:white;
}

.hero h1{
font-size:42px;
font-weight:700;
}

.hero p{
margin-top:10px;
font-size:16px;
}

.categories{
padding:25px 15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.category{
background:white;
padding:18px;
border-radius:18px;
text-align:center;
font-weight:600;
box-shadow:0 5px 15px rgba(0,0,0,.08);
cursor:pointer;
transition:.3s;
}

.category:hover{
transform:translateY(-3px);
}

.section{
padding:20px 15px;
}

.section-title{
font-size:28px;
font-weight:700;
margin-bottom:15px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card-title{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.card-desc{
font-size:14px;
line-height:1.5;
color:#666;
margin-bottom:15px;
}

.card-footer{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-size:24px;
font-weight:700;
color:#2e7d32;
}

.weight{
color:#888;
}

.footer{
margin-top:40px;
padding:30px;
text-align:center;
background:#1f2937;
color:white;
}

.phone{
display:inline-block;
margin-top:10px;
color:#fff;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<section
