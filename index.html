<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Бобри</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

.header{
background:#1b1b1b;
padding:25px;
text-align:center;
}

.header h1{
margin:0;
font-size:36px;
color:#d4af37;
}

.header p{
color:#ccc;
}

.category{
padding:20px;
}

.category h2{
color:#d4af37;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card img{
width:100%;
display:block;
}

.info{
padding:15px;
}

.name{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.price{
font-size:20px;
color:#d4af37;
font-weight:bold;
}

.weight{
color:#aaa;
margin-top:5px;
}

.ingredients{
margin-top:10px;
line-height:1.5;
color:#ddd;
}
</style>
</head>

<body>

<div class="header">
<h1>Три Бобри</h1>
<p>Меню ресторану</p>
</div>

<div class="category">
<h2>Салати</h2>

<div class="card">
<div class="info">
<div class="name">Салат з печінки та манговим соусом</div>
<div class="price">200 грн</div>
<div class="weight">250/50 г</div>
<div class="ingredients">
Індича печінка, мікс салатів, фета, яблука, грецькі горіхи, манговий соус.
</div>
</div>
</div>
</div>

<div class="category">
<h2>Гарячі закуски</h2>

<div class="card">
<div class="info">
<div class="name">Млинці з куркою та грибами</div>
<div class="price">200 грн</div>
<div class="weight">250/50 г</div>
</div>
</div>

<div class="card">
<div class="info">
<div class="name">Печінка у вишневому соусі</div>
<div class="price">220 грн</div>
<div class="weight">250 г</div>
</div>
</div>
