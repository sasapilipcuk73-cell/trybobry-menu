<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три Бобри | Меню</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f5f3ee;
color:#222;
}

.hero{
height:300px;
background:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:42px;
}

.hero p{
margin-top:10px;
}

.section{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.price{
color:#2e7d32;
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.footer{
background:#222;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}
</style>
</head>

<body>

<div class="hero">
<div class="hero-content">
<h1>ТРИ БОБРИ</h1>
<p>Сучасне меню ресторану</p>
</div>
</div>

<div class="section">

<div class="card">
<h2>Цезар з куркою</h2>
<p>Курка смажена, помідор, мікс салатів, пармезан, грінки, заправка.</p>
<div class="price">190 грн</div>
</div>

<div class="card">
<h2>Бограч</h2>
<p>Традиційна закарпатська страва.</p>
<div class="price">280 грн</div>
</div>

<div class="card">
<h2>Креветки в темпурі</h2>
<p>Подаються із соусом.</p>
<div class="price">450 грн</div>
</div>

</div>

<div class="footer">
<p>ГРК «Три Бобри»</p>
<p>Нововолинськ</p>
</div>

</body>
</html>
